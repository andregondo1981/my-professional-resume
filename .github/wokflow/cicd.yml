name: My first pipeline


on:
  push:
    branches: ["main"]


Jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code 
        uses: actions/checkout@v4 
      - name: Build image
        run: 
          docker build -t andregondo1981/cicd-portfolio .
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: andregondo1981
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push image
        run:
          docker push andregondo1981/cicd-portfolio

     